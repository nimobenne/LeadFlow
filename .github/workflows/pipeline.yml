name: LeadFlow Pipeline

on:
  workflow_dispatch:
    inputs:
      cities:
        description: 'Comma-separated UK cities (e.g. London,Manchester)'
        required: true
        type: string
      lead_limit:
        description: 'Max leads to find (50-200)'
        required: true
        default: '100'
        type: string
      force_refresh:
        description: 'Re-scrape existing leads'
        required: false
        default: 'false'
        type: string
      job_id:
        description: 'Supabase job ID (created by dashboard before triggering)'
        required: true
        type: string

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        working-directory: pipeline
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        working-directory: pipeline
        run: playwright install chromium --with-deps

      - name: Run pipeline
        working-directory: pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PIPELINE_CITIES: ${{ inputs.cities }}
          PIPELINE_LEAD_LIMIT: ${{ inputs.lead_limit }}
          PIPELINE_FORCE_REFRESH: ${{ inputs.force_refresh }}
          PIPELINE_JOB_ID: ${{ inputs.job_id }}
          CONCURRENCY: '3'
        run: python run_job.py

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-output
          path: pipeline/data/
          if-no-files-found: ignore
